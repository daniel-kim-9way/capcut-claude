<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ui_evidence Tweet (1:1 — X/Twitter post card with typewriter body + likes count-up)</title>
<link rel="stylesheet" href="shared.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  html, body { width: 1080px; height: 1080px; }

  .card {
    width: 980px;
    background: #FFFFFF;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 48px 50px 40px;
    box-sizing: border-box;
    opacity: 0;
    transform: translateY(24px);
    color: #0F1419;
  }

  .header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
  }

  .avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
    font-weight: 800;
    font-size: 38px;
    line-height: 1;
  }

  .meta { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  .name-row {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #0F1419;
    font-weight: 800;
    font-size: 30px;
    line-height: 1.1;
  }
  .verified {
    width: 26px; height: 26px;
    flex-shrink: 0;
  }
  .handle-row {
    color: #536471;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.4;
    margin-top: 2px;
  }

  .more-icon {
    color: #536471;
    font-size: 32px;
    line-height: 1;
    margin-left: auto;
    padding: 8px;
  }

  .body {
    font-size: 38px;
    font-weight: 500;
    line-height: 1.45;
    color: #0F1419;
    letter-spacing: var(--ls-snug);
    margin-bottom: 28px;
    white-space: pre-wrap;
  }
  .body .cursor {
    display: inline-block;
    width: 3px;
    height: 36px;
    background: #0F1419;
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .time-row {
    color: #536471;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 22px;
    border-bottom: 1px solid #EFF3F4;
    padding-bottom: 18px;
  }

  .stats {
    display: flex;
    gap: 50px;
    color: #536471;
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 22px;
    border-bottom: 1px solid #EFF3F4;
    padding-bottom: 18px;
  }
  .stat-num { color: #0F1419; font-weight: 700; margin-right: 6px; }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #536471;
  }
  .action {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 500;
  }
  .action.heart.liked { color: #F91880; }
  .action.heart.liked .heart-icon path { fill: #F91880; stroke: #F91880; }
  .icon { width: 32px; height: 32px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card">

      <div class="header">
        <div class="avatar" id="avatar">U</div>
        <div class="meta">
          <div class="name-row">
            <span id="display-name">유저</span>
            <svg class="verified" viewBox="0 0 24 24" fill="#1D9BF0"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81S3.48 7.27 3.94 8.66C2.63 9.32 1.75 10.57 1.75 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.9.81 3.91s2.52 1.26 3.91.81c.66 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z"/></svg>
          </div>
          <div class="handle-row">
            <span id="handle">@user</span>
          </div>
        </div>
        <div class="more-icon">···</div>
      </div>

      <div class="body" id="body"></div>

      <div class="time-row" id="time"></div>

      <div class="stats">
        <div><span class="stat-num" id="rt-num">0</span><span>리트윗</span></div>
        <div><span class="stat-num" id="lk-num">0</span><span>마음에 들어요</span></div>
      </div>

      <div class="actions">
        <div class="action">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#536471" stroke-width="1.8"><path d="M12 21l-1-1c-4.5-4-7-7-7-10a4 4 0 014-4 4.5 4.5 0 014 2.5A4.5 4.5 0 0116 6a4 4 0 014 4c0 3-2.5 6-7 10l-1 1z"/></svg>
        </div>
        <div class="action">
          <svg class="icon" viewBox="0 0 24 24" fill="#536471"><path d="M16.5 4l-3 3h2.5a2 2 0 012 2v6h-2V9h-3l3 3zm-9 16l3-3H8a2 2 0 01-2-2V9h2v6h3l-3-3z"/></svg>
        </div>
        <div class="action heart" id="heart-action">
          <svg class="icon heart-icon" viewBox="0 0 24 24" fill="none" stroke="#536471" stroke-width="1.8"><path d="M12 21s-7-4.5-9.5-9c-1.5-2.7 0-6 3-6 2 0 3.5 1.2 4 2.5C10 7.2 11.5 6 13.5 6c3 0 4.5 3.3 3 6-2.5 4.5-9.5 9-4.5 9z"/></svg>
        </div>
        <div class="action">
          <svg class="icon" viewBox="0 0 24 24" fill="#536471"><path d="M5 4h14v17l-7-3.5L5 21V4z"/></svg>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const P = window.__params || {
    avatar_initial: "C",
    avatar_bg: "#D77757",
    display_name: "Claude",
    handle: "@AnthropicAI",
    body: "기록은 미래의 나를 위한 가장 정직한 선물입니다.",
    time: "오후 3:42 · 2026-05-08 · 4.8M Views",
    retweet_count: 1247,
    like_count: 8423,
    duration: 7.0,
  };

  document.getElementById("avatar").textContent = (P.avatar_initial || "U").slice(0, 2);
  document.getElementById("avatar").style.background = P.avatar_bg || "#0F1419";
  document.getElementById("display-name").textContent = P.display_name || "User";
  document.getElementById("handle").textContent = P.handle || "@user";
  document.getElementById("time").textContent = P.time || "";

  const bodyEl = document.getElementById("body");
  const fullBody = P.body || "";

  const tl = gsap.timeline({ paused: true });
  const D = P.duration;

  // Card pop
  tl.to("#card", { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0);

  // Typewriter body
  const charState = { n: 0 };
  const typeDur = Math.max(0.6, Math.min(2.6, fullBody.length * 0.05));
  tl.to(charState, {
    n: fullBody.length,
    duration: typeDur,
    ease: "steps(" + Math.max(1, fullBody.length) + ")",
    onUpdate: () => {
      const slice = fullBody.slice(0, Math.floor(charState.n));
      bodyEl.innerHTML = slice + (charState.n < fullBody.length ? '<span class="cursor"></span>' : "");
    },
    onComplete: () => { bodyEl.textContent = fullBody; },
  }, 0.7);

  // Counters
  const rtState = { v: 0 };
  const lkState = { v: 0 };
  const rtFinal = P.retweet_count || 0;
  const lkFinal = P.like_count || 0;

  const countAt = 0.7 + typeDur + 0.2;
  tl.to(rtState, {
    v: rtFinal, duration: 1.1, ease: "power2.out",
    onUpdate: () => {
      document.getElementById("rt-num").textContent = Math.round(rtState.v).toLocaleString("en-US");
    },
  }, countAt);
  tl.to(lkState, {
    v: lkFinal, duration: 1.4, ease: "power2.out",
    onUpdate: () => {
      document.getElementById("lk-num").textContent = Math.round(lkState.v).toLocaleString("en-US");
    },
  }, countAt + 0.2);

  // Heart pulse + becomes liked at end of like-count animation
  tl.call(() => {
    document.getElementById("heart-action").classList.add("liked");
  }, [], countAt + 1.5);
  tl.fromTo("#heart-action", { scale: 1 }, { scale: 1.35, duration: 0.2, transformOrigin: "center", ease: "back.out(2)" }, countAt + 1.5);
  tl.to("#heart-action", { scale: 1, duration: 0.3, ease: "power2.inOut" }, countAt + 1.7);

  const consumed = countAt + 2.0;
  tl.to({}, { duration: Math.max(0.1, D - consumed) }, consumed);

  window.__tl = tl;
  window.__ready = true;
})();
</script>
</body>
</html>
