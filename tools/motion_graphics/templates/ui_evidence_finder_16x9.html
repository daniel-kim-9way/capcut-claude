<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ui_evidence Finder motion (16:9 macOS file browser)</title>
<link rel="stylesheet" href="shared.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  html, body { width: 1920px; height: 1080px; }

  .finder {
    width: 1600px;
    height: 900px;
    background: #ECECEC;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-card-heavy);
    opacity: 0;
    transform: translateY(30px);
  }

  .title-bar {
    height: 52px;
    background: #D7D7D7;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  .tl-btn { width: 14px; height: 14px; border-radius: 50%; }
  .tl-red    { background: var(--accent-error); }
  .tl-yellow { background: var(--accent-warning); }
  .tl-green  { background: var(--accent-success); }
  .path-label {
    flex: 1;
    text-align: center;
    color: #3A3A3A;
    font-size: 20px;
    font-weight: 500;
  }

  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .sidebar {
    width: 280px;
    background: #E8E8E8;
    padding: 28px 16px;
    border-right: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .sb-group {
    font-size: 16px;
    font-weight: 700;
    color: #8E8E8E;
    letter-spacing: 0.1em;
    margin: 10px 8px 10px;
    text-transform: uppercase;
  }
  .sb-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
    color: #1A1A1A;
    font-size: 20px;
    font-weight: 500;
  }
  .sb-item.active {
    background: #B0BDFF;
    color: #FFFFFF;
  }
  .sb-icon {
    width: 22px;
    height: 22px;
    background: #6E7380;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .sb-item.active .sb-icon { background: #FFFFFF; }

  .file-list {
    flex: 1;
    padding: 20px 32px;
    overflow: hidden;
    background: #FFFFFF;
  }
  .file-head {
    display: flex;
    padding: 16px 16px 16px;
    color: #606060;
    font-size: 18px;
    font-weight: 500;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  .file-head .fh-name { flex: 2; }
  .file-head .fh-size { width: 140px; text-align: right; }
  .file-head .fh-date { width: 220px; text-align: right; }

  .file-row {
    display: flex;
    align-items: center;
    padding: 16px;
    color: #1A1A1A;
    font-size: 26px;
    font-weight: 500;
    opacity: 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .file-row.highlight {
    background: #E8F0FF;
  }
  .fr-icon {
    width: 36px;
    height: 36px;
    background: #3B82F6;
    border-radius: 6px;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .fr-name { flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fr-size { width: 140px; text-align: right; color: #606060; font-size: 22px; }
  .fr-date { width: 220px; text-align: right; color: #606060; font-size: 22px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="finder" id="card">
      <div class="title-bar">
        <div class="tl-btn tl-red"></div>
        <div class="tl-btn tl-yellow"></div>
        <div class="tl-btn tl-green"></div>
        <div class="path-label" id="path-label">Documents</div>
      </div>
      <div class="main-area">
        <div class="sidebar">
          <div class="sb-group">즐겨찾기</div>
          <div class="sb-item"><div class="sb-icon"></div>Desktop</div>
          <div class="sb-item active"><div class="sb-icon"></div>Documents</div>
          <div class="sb-item"><div class="sb-icon"></div>Downloads</div>
          <div class="sb-item"><div class="sb-icon"></div>iCloud Drive</div>
        </div>
        <div class="file-list">
          <div class="file-head">
            <div class="fh-name">이름</div>
            <div class="fh-size">크기</div>
            <div class="fh-date">수정일</div>
          </div>
          <div class="file-row" id="f-0"><div class="fr-icon"></div><div class="fr-name" id="fn-0"></div><div class="fr-size" id="fs-0"></div><div class="fr-date" id="fd-0"></div></div>
          <div class="file-row" id="f-1"><div class="fr-icon"></div><div class="fr-name" id="fn-1"></div><div class="fr-size" id="fs-1"></div><div class="fr-date" id="fd-1"></div></div>
          <div class="file-row" id="f-2"><div class="fr-icon"></div><div class="fr-name" id="fn-2"></div><div class="fr-size" id="fs-2"></div><div class="fr-date" id="fd-2"></div></div>
          <div class="file-row" id="f-3"><div class="fr-icon"></div><div class="fr-name" id="fn-3"></div><div class="fr-size" id="fs-3"></div><div class="fr-date" id="fd-3"></div></div>
          <div class="file-row" id="f-4"><div class="fr-icon"></div><div class="fr-name" id="fn-4"></div><div class="fr-size" id="fs-4"></div><div class="fr-date" id="fd-4"></div></div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const P = window.__params || {
    path: "Documents",
    files: [
      { name: "프로젝트 회의록 2026-04.pdf", size: "1.2 MB", date: "오늘 14:32", highlight: true },
      { name: "예산 집계.xlsx", size: "340 KB", date: "어제 19:10" },
      { name: "디자인 시안 v2.sketch", size: "8.7 MB", date: "4월 22일" },
      { name: "scripts.zip", size: "2.1 MB", date: "4월 20일" },
      { name: "README.md", size: "4 KB", date: "4월 19일" },
    ],
    duration: 5.5,
  };

  document.getElementById("path-label").textContent = P.path || "Documents";

  const files = (P.files || []).slice(0, 5);
  files.forEach((f, i) => {
    document.getElementById(`fn-${i}`).textContent = f.name || "";
    document.getElementById(`fs-${i}`).textContent = f.size || "";
    document.getElementById(`fd-${i}`).textContent = f.date || "";
    if (f.highlight) document.getElementById(`f-${i}`).classList.add("highlight");
  });
  for (let i = files.length; i < 5; i++) {
    document.getElementById(`f-${i}`).style.display = "none";
  }

  const tl = gsap.timeline({ paused: true });
  const D = P.duration;

  tl.to("#card", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0);

  const fileStart = 0.8;
  const fileCycle = 0.25;
  files.forEach((_, i) => {
    tl.to(`#f-${i}`, { opacity: 1, duration: 0.3, ease: "power2.out" }, fileStart + i * fileCycle);
  });

  const consumed = fileStart + files.length * fileCycle + 0.3;
  tl.to({}, { duration: Math.max(0.1, D - consumed) }, consumed);

  window.__tl = tl;
  window.__ready = true;
})();
</script>
</body>
</html>
