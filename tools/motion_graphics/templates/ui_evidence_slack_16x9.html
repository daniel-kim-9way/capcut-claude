<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ui_evidence Slack motion (16:9 desktop workspace)</title>
<link rel="stylesheet" href="shared.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  html, body { width: 1920px; height: 1080px; }

  .slack {
    width: 1600px;
    height: 900px;
    background: #FFFFFF;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    box-shadow: var(--shadow-card-heavy);
    opacity: 0;
    transform: translateY(30px);
  }

  .sidebar {
    width: 280px;
    background: var(--brand-slack);
    padding: 24px 16px;
    flex-shrink: 0;
    color: #FFFFFF;
  }
  .workspace-name {
    font-size: 24px;
    font-weight: 700;
    padding: 8px 8px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 14px;
  }
  .channel-group-label {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    padding: 8px 8px;
    margin-top: 12px;
  }
  .channel-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 20px;
    margin-bottom: 4px;
    color: rgba(255,255,255,0.85);
  }
  .channel-item.active {
    background: #1164A3;
    color: #FFFFFF;
    font-weight: 700;
  }
  .channel-hash {
    font-weight: 300;
    opacity: 0.7;
  }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    height: 68px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #E0E0E0;
    flex-shrink: 0;
  }
  .ch-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-dark);
  }
  .ch-hash { font-weight: 300; color: #606060; margin-right: 8px; }

  .messages {
    flex: 1;
    padding: 30px 40px;
    overflow: hidden;
  }
  .msg {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    opacity: 0;
  }
  .m-avatar {
    width: 52px; height: 52px;
    border-radius: 10px;
    background: #B0B0B0;
    flex-shrink: 0;
  }
  .m-body { flex: 1; }
  .m-meta {
    display: flex;
    gap: 10px;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .m-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-dark);
  }
  .m-time {
    font-size: 16px;
    color: #808080;
  }
  .m-text {
    font-size: 24px;
    color: var(--text-dark);
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="slack" id="card">
      <div class="sidebar">
        <div class="workspace-name" id="workspace">Acme Inc.</div>
        <div class="channel-group-label">Channels</div>
        <div class="channel-item"><span class="channel-hash">#</span><span>general</span></div>
        <div class="channel-item active"><span class="channel-hash">#</span><span id="channel-active">project-alpha</span></div>
        <div class="channel-item"><span class="channel-hash">#</span><span>random</span></div>
        <div class="channel-item"><span class="channel-hash">#</span><span>design</span></div>
      </div>
      <div class="chat-area">
        <div class="chat-header">
          <span class="ch-hash">#</span>
          <span class="ch-title" id="ch-title">project-alpha</span>
        </div>
        <div class="messages">
          <div class="msg" id="m-0">
            <div class="m-avatar"></div>
            <div class="m-body">
              <div class="m-meta"><span class="m-name" id="n-0"></span><span class="m-time" id="t-0"></span></div>
              <div class="m-text" id="x-0"></div>
            </div>
          </div>
          <div class="msg" id="m-1">
            <div class="m-avatar"></div>
            <div class="m-body">
              <div class="m-meta"><span class="m-name" id="n-1"></span><span class="m-time" id="t-1"></span></div>
              <div class="m-text" id="x-1"></div>
            </div>
          </div>
          <div class="msg" id="m-2">
            <div class="m-avatar"></div>
            <div class="m-body">
              <div class="m-meta"><span class="m-name" id="n-2"></span><span class="m-time" id="t-2"></span></div>
              <div class="m-text" id="x-2"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const P = window.__params || {
    workspace: "Acme Inc.",
    channel: "project-alpha",
    messages: [
      { name: "김팀장", time: "오후 3:42", text: "회의 요약 공유합니다 📝" },
      { name: "박디자이너", time: "오후 3:43", text: "UI 시안 오늘 중으로 올려드릴게요!" },
      { name: "이개발", time: "오후 3:45", text: "👍 감사합니다" },
    ],
    duration: 6.0,
  };

  document.getElementById("workspace").textContent = P.workspace || "";
  document.getElementById("channel-active").textContent = P.channel || "";
  document.getElementById("ch-title").textContent = P.channel || "";

  const msgs = (P.messages || []).slice(0, 3);
  msgs.forEach((m, i) => {
    document.getElementById(`n-${i}`).textContent = m.name || "";
    document.getElementById(`t-${i}`).textContent = m.time || "";
    document.getElementById(`x-${i}`).textContent = m.text || "";
  });
  for (let i = msgs.length; i < 3; i++) {
    document.getElementById(`m-${i}`).style.display = "none";
  }

  const tl = gsap.timeline({ paused: true });
  const D = P.duration;

  tl.to("#card", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0);

  const msgStart = 0.9;
  const msgCycle = 1.0;
  msgs.forEach((_, i) => {
    tl.to(`#m-${i}`, { opacity: 1, duration: 0.4, ease: "power2.out" }, msgStart + i * msgCycle);
  });

  const consumed = msgStart + msgs.length * msgCycle + 0.2;
  tl.to({}, { duration: Math.max(0.1, D - consumed) }, consumed);

  window.__tl = tl;
  window.__ready = true;
})();
</script>
</body>
</html>
