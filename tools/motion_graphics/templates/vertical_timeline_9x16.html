<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>vertical_timeline motion (9:16 — 정사각 카드 상단)</title>
<!--
  vertical_timeline_9x16 (2026-06-11 재설계) — VO 동기 세로 단계 진행선, **정사각 카드를 상단에**.
  ------------------------------------------------------------------
  모션 B-roll은 overlay_patcher가 scale 1.0(캔버스 가득)으로 고정하므로, MOV는 9:16 풀프레임
  (1080x1920)이되 **카드를 상단 band에만 그려** 얼굴(중앙)·자막(하단) zone을 비운다.
  → 결과: 9:16 토킹헤드 상단에 작은 카드. 레일 head가 도달하는 순간 dot 켜짐.
  params: steps(["a","b","c"] 또는 [{label}]), title(선택), accent, duration
  thumb: 0.4=1단계, 0.6=2단계, 0.85=전부.
-->
<link rel="stylesheet" href="shared.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="shared_motion.js"></script>
<style>
  html, body { width: 1080px; height: 1920px; }
  body { margin: 0; background: transparent; }
  .stage { position: absolute; inset: 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 185px; }
  .card { position: relative; width: 700px; box-sizing: border-box;
    padding: 42px 50px; border-radius: 40px;
    background: rgba(24, 20, 36, 0.92); border: 2px solid rgba(179,102,255,0.26); }

  .title { font-size: 50px; font-weight: 800; color: #C9C3D4; margin: 0 0 28px 4px;
           letter-spacing: -0.01em; text-shadow: 0 3px 14px rgba(0,0,0,0.6); }

  .track { position: relative; }
  .rail { position: absolute; left: 38px; width: 6px; border-radius: 3px; background: #38384a; }
  .rail-fill { position: absolute; left: 38px; width: 6px; border-radius: 3px;
               background: var(--accent, #B366FF); transform-origin: top center; transform: scaleY(0);
               box-shadow: 0 0 14px 1px rgba(179,102,255,0.5); }

  .step { position: relative; display: flex; align-items: center; gap: 30px; height: 124px; }
  .dot { position: relative; z-index: 2; width: 78px; height: 78px; border-radius: 50%;
         background: #1a1a22; border: 5px solid #38384a; box-sizing: border-box;
         display: flex; align-items: center; justify-content: center;
         font-size: 40px; font-weight: 900; color: #6b6b80; flex: 0 0 auto; }
  .dot.on { border-color: var(--accent, #B366FF); background: var(--accent, #B366FF); color: #10101a;
            box-shadow: 0 0 26px 4px rgba(179,102,255,0.5); }
  .label { font-size: 54px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.01em;
           line-height: 1.1; text-shadow: 0 3px 16px rgba(0,0,0,0.6); }
</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card">
      <div class="title" id="title"></div>
      <div class="track" id="track">
        <div class="rail" id="rail"></div>
        <div class="rail-fill" id="rail-fill"></div>
      </div>
    </div>
  </div>
<script>
(() => {
  const P = window.__params || {
    steps: ["인식", "수용", "행동"],
    title: "",
    accent: "#B366FF",
    duration: 5.5,
  };
  const D = Number(P.duration) || 5.5;
  if (P.accent) document.documentElement.style.setProperty("--accent", P.accent);
  const steps = (Array.isArray(P.steps) ? P.steps : []).map((s) =>
    typeof s === "string" ? { label: s } : s || {}
  ).slice(0, 4);
  const n = Math.max(1, steps.length);

  const titleEl = document.getElementById("title");
  if (P.title) titleEl.textContent = String(P.title); else titleEl.style.display = "none";

  const track = document.getElementById("track");
  const rail = document.getElementById("rail");
  const railFill = document.getElementById("rail-fill");
  const dots = [], labels = [];
  steps.forEach((s, i) => {
    const step = document.createElement("div");
    step.className = "step";
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.textContent = String(i + 1);
    const label = document.createElement("div");
    label.className = "label";
    label.textContent = String(s.label || "");
    step.appendChild(dot);
    step.appendChild(label);
    track.appendChild(step);
    dots.push(dot);
    labels.push(label);
  });

  const stepH = 124, dotR = 39;
  const railTop = dotR, railLen = (n - 1) * stepH;
  rail.style.top = railTop + "px"; rail.style.height = Math.max(1, railLen) + "px";
  railFill.style.top = railTop + "px"; railFill.style.height = Math.max(1, railLen) + "px";

  const card = document.getElementById("card");
  gsap.set(card, { opacity: 0, y: 18 });
  gsap.set(dots, { scale: 0.85 });
  gsap.set(labels, { opacity: 0, x: -16 });

  const tl = gsap.timeline({ paused: true });
  tl.to(card, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 0.1);

  const railStart = 0.55, segDur = 0.6;
  const railTotal = Math.max(0.4, (n - 1) * segDur);
  tl.to(railFill, { scaleY: 1, duration: railTotal, ease: "none" }, railStart);

  steps.forEach((s, i) => {
    const at = railStart + (n === 1 ? 0 : (i / (n - 1)) * railTotal);
    tl.add(() => dots[i].classList.add("on"), at);
    tl.to(dots[i], { scale: 1.12, duration: 0.16, yoyo: true, repeat: 1, ease: "power2.out" }, at);
    tl.to(labels[i], { opacity: 1, x: 0, duration: 0.34, ease: "power3.out" }, at + 0.04);
  });

  const consumed = railStart + railTotal + 0.6;
  if (window.MGMotion) window.MGMotion.livingTail(tl, card, consumed, D);
  else tl.to({}, { duration: Math.max(0.1, D - consumed) }, consumed);

  window.__tl = tl;
  window.__ready = true;
})();
</script>
</body>
</html>
