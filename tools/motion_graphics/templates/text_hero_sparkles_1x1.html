<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>text_hero_sparkles motion (1:1 — hero phrase + sparkle particle burst)</title>
<link rel="stylesheet" href="shared.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  html, body { width: 1080px; height: 1080px; }

  .card {
    position: relative;
    width: 920px;
    height: 920px;
    background: var(--bg-dark);
    border-radius: var(--radius-lg);
    padding: 60px;
    box-sizing: border-box;
    opacity: 0;
    transform: scale(0.94);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    overflow: hidden;
  }

  .label {
    position: relative;
    z-index: 2;
    font-size: var(--fs-h4);
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: var(--ls-wide);
    opacity: 0;
  }

  .phrase {
    position: relative;
    z-index: 2;
    font-size: 140px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: var(--ls-tight);
    text-align: center;
    color: var(--text-primary);
  }

  .word {
    display: inline-block;
    margin: 0 0.1em;
    opacity: 0;
    transform: translateY(20px) scale(0.92);
  }

  .word.accent {
    background: linear-gradient(120deg, #B366FF 0%, #FD297B 50%, #FFBD2E 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: transparent;
  }

  /* Sparkle layer — absolute positioned star particles */
  .sparkle {
    position: absolute;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transform-origin: center;
  }
  .sparkle svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card">
      <div class="label" id="label"></div>
      <div class="phrase" id="phrase"></div>
    </div>
  </div>

<script>
(() => {
  const P = window.__params || {
    label: "한 줄로 요약하면",
    phrase: "지금 시작",
    accent_words: ["시작"],
    duration: 4.5,
    sparkle_count: 14,
  };

  const phraseEl = document.getElementById("phrase");
  const labelEl = document.getElementById("label");
  const card = document.getElementById("card");

  if (P.label) labelEl.textContent = P.label;
  else labelEl.style.display = "none";

  const accentList = P.accent_words || [];
  const words = (P.phrase || "").split(/\s+/).filter(Boolean);
  phraseEl.innerHTML = words.map((w) => {
    const isAccent = accentList.some((a) => a && w.includes(a));
    const cls = isAccent ? "word accent" : "word";
    return `<span class="${cls}">${w}</span>`;
  }).join(" ");

  // --- Generate sparkle particles ---
  // 4-pointed star SVG path (Magic UI / Aceternity sparkles vibe)
  const STAR_SVG = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0 L13.5 10.5 L24 12 L13.5 13.5 L12 24 L10.5 13.5 L0 12 L10.5 10.5 Z"/></svg>`;
  const COLORS = ["#FFFFFF", "#FFE15C", "#B366FF", "#FD297B"];

  const N = Math.max(6, Math.min(24, P.sparkle_count || 14));
  const sparkles = [];
  // Seeded pseudo-random so frames are reproducible across renders
  let seed = 7;
  function rand() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }
  for (let i = 0; i < N; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    const size = 16 + Math.floor(rand() * 36); // 16..52 px
    s.style.width = size + "px";
    s.style.height = size + "px";
    // Distribute across the card area, biased away from extreme center
    const cx = 460 + (rand() - 0.5) * 820; // card is 920px wide
    const cy = 460 + (rand() - 0.5) * 820;
    s.style.left = cx + "px";
    s.style.top = cy + "px";
    s.style.color = COLORS[i % COLORS.length];
    s.innerHTML = STAR_SVG;
    card.appendChild(s);
    sparkles.push(s);
  }

  const tl = gsap.timeline({ paused: true });
  const D = P.duration;

  tl.to("#card", { opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" }, 0);
  if (P.label) {
    tl.to("#label", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.4);
  }
  tl.to(".word", {
    opacity: 1,
    y: 0,
    scale: 1,
    duration: 0.55,
    stagger: 0.14,
    ease: "back.out(1.6)",
  }, 0.7);

  // Sparkle twinkle: stagger appear → grow → shrink-out (yoyo-like via to/to chain)
  sparkles.forEach((s, i) => {
    const at = 0.9 + (i / sparkles.length) * 1.6;
    tl.fromTo(s,
      { opacity: 0, scale: 0.2, rotate: 0 },
      { opacity: 1, scale: 1.0, rotate: 90, duration: 0.45, ease: "back.out(2)" },
      at);
    tl.to(s, { opacity: 0, scale: 0.4, duration: 0.6, ease: "power2.in" }, at + 0.6);
  });

  const consumed = 2.8 + 0.55 + 0.14 * Math.max(0, words.length - 1);
  tl.to({}, { duration: Math.max(0.1, D - consumed) }, consumed);

  window.__tl = tl;
  window.__ready = true;
})();
</script>
</body>
</html>
