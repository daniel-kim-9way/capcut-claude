<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>comment_input motion (9:16 mobile) — 한 사람이 댓글 입력</title>
<link rel="stylesheet" href="shared.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  html, body { width: 1080px; height: 1920px; }
  .stage { align-items: center; }

  /* 단일 댓글 입력 모듈 — 가짜 댓글 목록/숫자 없음 */
  .card {
    width: 940px;
    background: var(--bg-dark);
    border-radius: var(--radius-lg);
    padding: 64px 56px 56px;
    box-sizing: border-box;
    opacity: 0;
    transform: translateY(40px);
    box-shadow: var(--shadow-card-heavy);
  }

  .label {
    font-size: 40px;
    font-weight: 700;
    color: var(--text-muted-dark);
    letter-spacing: var(--ls-snug);
    margin-bottom: 44px;
    opacity: 0;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 32px;
  }
  .avatar {
    width: 92px; height: 92px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4b4b52, #2a2a30);
    flex-shrink: 0;
  }
  .input-wrap { flex: 1; }
  .input-box {
    min-height: 70px;
    border-bottom: 3px solid rgba(255,255,255,0.14);
    padding-bottom: 22px;
    display: flex;
    align-items: baseline;
    font-size: 52px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.25;
  }
  .placeholder { color: var(--text-muted); }
  .typed { color: var(--text-primary); white-space: pre; }
  .cursor {
    display: inline-block;
    width: 4px;
    height: 56px;
    background: var(--accent);
    margin-left: 4px;
    transform: translateY(8px);
    opacity: 0;
  }

  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 28px;
    margin-top: 48px;
  }
  .btn {
    font-size: 38px;
    font-weight: 700;
    padding: 22px 52px;
    border-radius: 48px;
  }
  .btn-cancel { color: var(--text-muted-dark); }
  .btn-post {
    background: rgba(255,255,255,0.10);
    color: var(--text-muted);
  }
  .btn-post.active {
    background: var(--accent);
    color: #FFFFFF;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card">
      <div class="label" id="label">댓글 추가</div>
      <div class="row">
        <div class="avatar"></div>
        <div class="input-wrap">
          <div class="input-box">
            <span class="placeholder" id="placeholder">댓글 입력...</span>
            <span class="typed" id="typed"></span><span class="cursor" id="cursor"></span>
          </div>
          <div class="actions">
            <div class="btn btn-cancel">취소</div>
            <div class="btn btn-post" id="post">게시</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const P = window.__params || {
    label: "댓글 추가",
    placeholder: "댓글 입력...",
    text: "디엔에이",
    button_label: "게시",
    accent: "amber",
    duration: 5.0,
  };

  // accent 1색 주입 (영상당 1색 — DT-01)
  const accentMap = { purple:"#B366FF", blue:"#0070F3", green:"#2AF598", amber:"#FFB020" };
  if (P.accent && accentMap[P.accent]) {
    document.documentElement.style.setProperty("--accent", accentMap[P.accent]);
  }

  if (P.label) document.getElementById("label").textContent = P.label;
  if (P.placeholder) document.getElementById("placeholder").textContent = P.placeholder;
  if (P.button_label) document.getElementById("post").textContent = P.button_label;

  const text = P.text || "디엔에이";
  const placeholderEl = document.getElementById("placeholder");
  const typedEl = document.getElementById("typed");
  const cursorEl = document.getElementById("cursor");
  const postEl = document.getElementById("post");

  const tl = gsap.timeline({ paused: true });
  const D = P.duration;

  // 카드 + 라벨 등장
  tl.to("#card", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0);
  tl.to("#label", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.3);

  // 입력란 포커스 → 커서 등장 + placeholder 사라짐
  tl.to(cursorEl, { opacity: 1, duration: 0.15 }, 0.9);
  tl.to(placeholderEl, { opacity: 0, duration: 0.2,
    onComplete: () => { placeholderEl.style.display = "none"; } }, 0.9);

  // 커서 깜빡임 (타이핑 시작 전까지)
  tl.to(cursorEl, { opacity: 0, duration: 0.45, repeat: 1, yoyo: true, ease: "steps(1)" }, 1.0);

  // "디엔에이" 한 글자씩 타이핑
  const typeStart = 1.9;
  const typeDur = 1.2;
  const state = { n: 0 };
  tl.to(state, {
    n: text.length,
    duration: typeDur,
    ease: "steps(" + Math.max(1, text.length) + ")",
    onUpdate: () => { typedEl.textContent = text.slice(0, Math.floor(state.n)); },
    onComplete: () => { typedEl.textContent = text; },
  }, typeStart);

  // 타이핑 끝나면 게시 버튼 활성화 (회색→accent + pop)
  const activateAt = typeStart + typeDur + 0.15;
  tl.add(() => postEl.classList.add("active"), activateAt);
  tl.fromTo(postEl, { scale: 0.92 }, { scale: 1, duration: 0.35, ease: "back.out(1.8)", transformOrigin: "center" }, activateAt);

  // 커서 계속 깜빡 (게시 전까지)
  tl.to(cursorEl, { opacity: 0, duration: 0.45, repeat: 3, yoyo: true, ease: "steps(1)" }, activateAt + 0.1);

  const consumed = activateAt + 0.5;
  tl.to({}, { duration: Math.max(0.1, D - consumed) }, consumed);

  window.__tl = tl;
  window.__ready = true;
})();
</script>
</body>
</html>
