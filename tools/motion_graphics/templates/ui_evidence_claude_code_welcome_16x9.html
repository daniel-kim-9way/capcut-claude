<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ui_evidence Claude Code Welcome (16:9 — startup screen with mascot + input)</title>
<link rel="stylesheet" href="shared.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  html, body { width: 1920px; height: 1080px; }

  .terminal {
    width: 1620px;
    height: 920px;
    background: #0F0F0F;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-card-heavy);
    opacity: 0;
    transform: translateY(30px);
    position: relative;
  }

  /* Top header: ✶ Claude Code */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 38px 0 24px;
    flex-shrink: 0;
    opacity: 0;
  }
  .header svg.starburst { width: 38px; height: 38px; overflow: visible; }
  .star-arm { fill: #D97757; transform-origin: 50px 50px; }

  .header-text {
    color: #FFFFFF;
    font-size: 36px;
    font-weight: var(--fw-bold);
    letter-spacing: -0.01em;
  }

  /* Welcome area (center) */
  .welcome-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 0 60px;
  }

  /* Pixel mascot — Claude Code's CLI character */
  .mascot {
    opacity: 0;
    transform: scale(0.6) translateY(-10px);
  }
  .mascot svg { width: 130px; height: 95px; }

  .welcome-text {
    color: #C7C7CC;
    font-size: 30px;
    font-weight: var(--fw-medium);
    line-height: 1.5;
    text-align: center;
    max-width: 760px;
    letter-spacing: var(--ls-snug);
    opacity: 0;
    transform: translateY(14px);
  }

  /* Input bar at bottom — red (orange-coral) outlined */
  .input-bar {
    margin: 0 30px 30px;
    background: #161618;
    border: 2px solid #D97757;
    border-radius: 14px;
    padding: 22px 28px 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(30px);
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .input-cursor {
    width: 3px;
    height: 30px;
    background: #C7C7CC;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .placeholder {
    color: #6B6B70;
    font-size: 26px;
    flex: 1;
  }
  .mic-icon {
    width: 26px;
    height: 26px;
    border: 2px solid #6B6B70;
    border-radius: 13px 13px 13px 13px;
    position: relative;
  }
  .mic-icon::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 4px;
    background: #6B6B70;
    border-radius: 2px;
  }

  .actions-row {
    display: flex;
    align-items: center;
    gap: 18px;
    color: #6B6B70;
    font-size: 22px;
    font-weight: var(--fw-medium);
  }
  .actions-row .glyph {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: #2A2A2E;
    color: #C7C7CC;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: var(--fw-bold);
  }
  .divider {
    width: 1px; height: 24px;
    background: #2A2A2E;
  }
  .file-chip {
    color: #C7C7CC;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-chip::before {
    content: "";
    width: 18px; height: 22px;
    background: #C7C7CC;
    clip-path: polygon(0 0, 70% 0, 100% 30%, 100% 100%, 0 100%);
  }
  .spacer { flex: 1; }
  .perm-tag {
    display: flex; align-items: center; gap: 8px;
    color: #C7C7CC;
  }
  .send-btn {
    width: 44px; height: 44px;
    background: #D97757;
    color: #FFFFFF;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: var(--fw-bold);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="terminal" id="card">

      <div class="header" id="hdr">
        <svg class="starburst" viewBox="0 0 100 100">
          <defs>
            <path id="arm-w" d="M 50 5 Q 53 25 50 50 Q 47 25 50 5 Z" />
          </defs>
          <use href="#arm-w" class="star-arm" transform="rotate(0 50 50)"/>
          <use href="#arm-w" class="star-arm" transform="rotate(45 50 50)"/>
          <use href="#arm-w" class="star-arm" transform="rotate(90 50 50)"/>
          <use href="#arm-w" class="star-arm" transform="rotate(135 50 50)"/>
          <use href="#arm-w" class="star-arm" transform="rotate(180 50 50)"/>
          <use href="#arm-w" class="star-arm" transform="rotate(225 50 50)"/>
          <use href="#arm-w" class="star-arm" transform="rotate(270 50 50)"/>
          <use href="#arm-w" class="star-arm" transform="rotate(315 50 50)"/>
        </svg>
        <span class="header-text">Claude Code</span>
      </div>

      <div class="welcome-area">
        <div class="mascot" id="mascot">
          <!-- Pixel-art mascot: 5×4 head with two square eyes + small feet -->
          <svg viewBox="0 0 130 95">
            <!-- Body (rounded top, square bottom with feet bumps) -->
            <path d="M 18 18
                     Q 18 0 38 0
                     L 92 0
                     Q 112 0 112 18
                     L 112 70
                     L 100 70 L 100 85 L 88 85 L 88 70
                     L 75 70 L 75 85 L 63 85 L 63 70
                     L 50 70 L 50 85 L 38 85 L 38 70
                     L 18 70 Z"
                  fill="#D97757"/>
            <!-- Eyes (two black squares) -->
            <rect x="42" y="32" width="18" height="18" fill="#1A1A1A"/>
            <rect x="70" y="32" width="18" height="18" fill="#1A1A1A"/>
          </svg>
        </div>
        <div class="welcome-text" id="welcome-text"></div>
      </div>

      <div class="input-bar" id="input">
        <div class="input-row">
          <span class="input-cursor"></span>
          <span class="placeholder" id="placeholder">ctrl esc to focus or unfocus Claude</span>
          <span class="mic-icon"></span>
        </div>
        <div class="actions-row">
          <span class="glyph">+</span>
          <span class="glyph">/</span>
          <span class="divider"></span>
          <span class="file-chip" id="file-chip">SKILL.md</span>
          <span class="spacer"></span>
          <span class="perm-tag" id="perm-tag">⊘ Bypass permissions</span>
          <span class="send-btn">↑</span>
        </div>
      </div>

    </div>
  </div>

<script>
(() => {
  const P = window.__params || {
    welcome_text: "Make a CLAUDE.md file for instructions Claude will read every single time.",
    placeholder: "ctrl esc to focus or unfocus Claude",
    file_chip: "SKILL.md",
    perm_tag: "⊘ Bypass permissions",
    duration: 5.0,
  };

  document.getElementById("welcome-text").textContent = P.welcome_text || "";
  document.getElementById("placeholder").textContent = P.placeholder || "";
  document.getElementById("file-chip").textContent = P.file_chip || "";
  document.getElementById("perm-tag").textContent = P.perm_tag || "";

  const tl = gsap.timeline({ paused: true });
  const D = P.duration;

  // Terminal slides up
  tl.to("#card", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0);

  // Header (starburst + text) fade in
  tl.to("#hdr", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);

  // Mascot pop with overshoot
  tl.to("#mascot", {
    opacity: 1, scale: 1, y: 0,
    duration: 0.55, ease: "back.out(1.7)",
  }, 1.1);
  // Subtle bob
  tl.to("#mascot", {
    y: -8, duration: 0.7,
    yoyo: true, repeat: 1, ease: "power2.inOut",
  }, 1.7);

  // Welcome text fade up
  tl.to("#welcome-text", {
    opacity: 1, y: 0,
    duration: 0.4, ease: "power2.out",
  }, 1.5);

  // Input bar slide up
  tl.to("#input", {
    opacity: 1, y: 0,
    duration: 0.5, ease: "power3.out",
  }, 2.0);

  // Hold
  tl.to({}, { duration: Math.max(0.1, D - 2.6) }, 2.6);

  window.__tl = tl;
  window.__ready = true;
})();
</script>
</body>
</html>
